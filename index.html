    title: 'DPAIL: Training Diffusion Policy for Adversarial Imitation Learning without Policy Optimization',
    authors: 'Yunseon Choi, Minchan Jeong, Soobin Um, Kee-Eung Kim',
    venue: 'NeurIPS 2025',

    topic: 'diffusion policy, imitation learning, adversarial IL',
    status: 'unread',
    summary: `
<h3>What Problem Does This Paper Solve?</h3>
<p>When a human expert demonstrates a task, they do not always do it the same way. A robot learning to cook might watch a person who sometimes grabs ingredients from the left side of the counter, sometimes from the right. These different but equally valid strategies form what researchers call a <strong>multimodal demonstration dataset</strong>. The challenge is: how do you teach an AI policy to reproduce this diversity instead of averaging it away into a single bland strategy?</p>
<p>Traditional Adversarial Imitation Learning (AIL) methods, like GAIL, struggle here. They tend to collapse all behavior modes into one, missing the richness of the expert. More recent work using diffusion models as policy representations seemed promising — diffusion models can naturally represent multimodal distributions — but they came with a critical technical incompatibility with the most efficient AIL frameworks. This paper, DPAIL, resolves that incompatibility.</p>

<h3>Background: The Three Building Blocks</h3>
<p><strong>Imitation Learning (IL)</strong> is the task of training an agent to behave like an expert by observing demonstrations, without access to an explicit reward signal. The simplest approach, Behavioral Cloning (BC), directly minimizes the difference between expert actions and predicted actions via supervised learning. It is simple but fails badly when the agent encounters states not seen in training, because small errors compound over time.</p>
<p><strong>Adversarial Imitation Learning (AIL)</strong> reframes imitation as a distribution-matching problem. Instead of copying actions state-by-state, the agent tries to make its overall trajectory distribution match the expert's. The most famous version, GAIL, frames this as a game between a policy (generator) and a discriminator that tries to distinguish expert trajectories from agent trajectories. The policy is then trained via reinforcement learning to fool the discriminator. This requires alternating between two expensive optimization loops — updating the discriminator and updating the policy — which is computationally heavy and sometimes unstable.</p>
<p><strong>ASAF (Adversarial Soft Advantage Fitting)</strong> is a clever simplification. It restructures the discriminator so that, at optimality, it directly encodes the updated policy. This means the policy update comes "for free" from the discriminator parameters — you only need to run one optimization loop, not two. However, ASAF requires that the policy's probability density can be evaluated in closed form (e.g., Gaussian, normalizing flow). Diffusion models generate samples via iterative denoising, so their exact likelihoods are intractable. ASAF simply cannot be applied naively to diffusion policies.</p>
<p><strong>Diffusion Models</strong> are generative models that learn to reverse a noise-adding process. Starting from pure Gaussian noise, the model denoises step by step to produce a sample from the data distribution. They are particularly good at capturing complex, multimodal distributions. Diffusion-BC showed that diffusion policies could reproduce diverse human demonstrations better than Gaussian policies, but Diffusion-BC is pure behavioral cloning — it doesn't generalize well beyond demonstrations.</p>

<h3>The Core Contribution: A Tractable Lower Bound</h3>
<p>DPAIL's key insight is that even though you cannot directly compute the marginal likelihood <em>p_θ(τ)</em> of a diffusion policy, you can derive a tight <strong>lower bound</strong> on the ASAF objective that only requires computing noise prediction errors — which are cheap.</p>
<p>The derivation proceeds as follows. ASAF's discriminator training objective involves a log-ratio of trajectory densities: log(p_θ(τ) / p_θ_old(τ)). For diffusion models, this ratio can be rewritten by expanding the joint densities over all diffusion timesteps and canceling common terms. What remains is a ratio of reverse-process transition probabilities. Taking an expectation over the forward noising process and applying Jensen's inequality (since log σ(·) is concave) yields a lower bound expressed entirely in terms of noise prediction errors.</p>
<p>The resulting DPAIL training objective has two components:</p>
<ul>
<li><strong>Expert term</strong>: Encourage the current policy θ to predict noise on expert trajectories more accurately than the old policy θ_old. Intuitively: be better at "understanding" expert data.</li>
<li><strong>Generator term</strong>: Discourage the current policy from being too good at predicting noise on its own generated trajectories. Intuitively: do not just memorize self-generated data.</li>
</ul>
<p>Both terms look like: log σ(N · (‖ε − ε_θ_old(τ, i)‖² − ‖ε − ε_θ(τ, i)‖²)). The difference in squared noise prediction errors, passed through a sigmoid, serves as the training signal. This is a minorization-maximization (MM) algorithm: each iteration maximizes a lower bound of the true objective, and the bound is tight at convergence (when θ = θ_old), guaranteeing monotonic improvement.</p>

<h3>How DPAIL Differs from DRAIL</h3>
<p>DRAIL also combines diffusion models with AIL and has a similar-looking loss formula involving differences of noise prediction errors. However, the two methods are fundamentally different in purpose. DRAIL uses a diffusion model as the <em>discriminator</em>, not the policy. The DRAIL policy is a standard unimodal Gaussian trained via RL using discriminator outputs as rewards. It therefore cannot represent multimodal behavior. DPAIL uses the diffusion model as the <em>policy</em> itself, so multimodal behavior is naturally captured in the generative distribution.</p>

<h3>Practical Implementation Details</h3>
<p>DPAIL generates fixed-horizon sub-trajectories of length H rather than full episode trajectories. The current state is injected at every diffusion step to condition the policy on the environment's current state. An important practical detail: when evaluating the generator term, the denoising error is clipped to prevent numerical instability from large prediction errors on out-of-distribution states. The full algorithm simply alternates between collecting trajectories with the current diffusion policy and updating the noise prediction network with the DPAIL objective.</p>

<h3>Experiments and Results</h3>
<p>DPAIL is evaluated on six environments: HalfCheetah, Walker2d, Ant, AntGoal (MuJoCo), and maze2d-medium and maze2d-large. These environments all have multimodal expert demonstrations (e.g., running forward vs. backward, navigating to multiple possible goals).</p>
<p>Performance is measured on two dimensions simultaneously: <strong>normalized score</strong> (task success) and <strong>entropy</strong> (behavioral diversity, measured from trajectory embeddings). The key finding is that most methods trade off one for the other. GAIL, DiffAIL, and DRAIL achieve moderate to high scores but near-zero entropy — they collapse to a single mode. InfoGAIL and ASAF show some diversity but lower scores. DPAIL achieves both high score and high entropy across nearly all environments. For example, in Walker2d-v3: DPAIL achieves 0.78 score and 0.41 entropy, while GAIL gets 0.72 score but 0.00 entropy.</p>
<p>Qualitative trajectory visualizations confirm that DPAIL's generated trajectories spread across all expert modes (all four ant directions, all maze goal positions), while other methods cluster around one mode. As the number of behavior modes is scaled up, DPAIL's entropy advantage grows — it handles complexity that breaks other methods.</p>

<h3>Why This Matters</h3>
<p>DPAIL is the first AIL framework that successfully combines the training efficiency of ASAF (no policy optimization loop) with the expressive power of diffusion policies (multimodal behavior). The derivation is mathematically elegant and practically straightforward. For the lab's broader research agenda in reinforcement and imitation learning, this represents a meaningful advance in making learned policies that are both capable and diverse — properties that matter for real-world robotics and autonomous agents where rigid, single-mode behavior is brittle.</p>
`
  },
  {
    id: 'p2',
    professor: 'Kee-Eung Kim',
    title: 'Dynamic VLM-Guided Negative Prompting for Diffusion Models',
    authors: 'Hoyeon Chang, Seungjin Kim, Yoonseok Choi (KAIST)',
    venue: 'NeurIPS 2025 Workshop',
    url: 'asset/KeeEungKim/NeurIPSWS2025.pdf',
    topic: 'diffusion models, negative prompting, VLM, content safety',
    status: 'unread',
    summary: `
<h3>What Problem Does This Paper Solve?</h3>
<p>Text-to-image (T2I) diffusion models like Stable Diffusion are powerful but can generate unsafe or unwanted content from seemingly benign prompts. A common defense is <strong>negative prompting</strong>: you specify concepts you want to avoid (e.g., "nudity, violence") and the model is steered away from them using Classifier-Free Guidance (CFG). This is effective but has two significant weaknesses that this paper addresses.</p>
<p>First, <strong>over-correction</strong>: if your negative prompt says "nudity" but the image wasn't going to include nudity anyway, the guidance actively pushes away from that concept and ends up distorting the image — semantic drift. The model unnecessarily sacrifices image quality to suppress something that wasn't present. Second, <strong>anticipation failure</strong>: you need to define your negative prompts before generation starts, but it is impossible to know in advance every problematic element that might emerge from a complex positive prompt. A prompt like "person at the beach" could lead to various problems depending on context, and a fixed set of negatives cannot cover all possibilities.</p>

<h3>Background: How Negative Prompting Works</h3>
<p>Classifier-Free Guidance (CFG) is the core mechanism. During denoising, instead of just following the conditional score ∇ log p(x|c+), the model computes a weighted combination: the unconditional score plus ω times the difference between conditional and unconditional scores. This pushes the generation toward the positive condition. Negative prompting extends this: you additionally compute a negative-condition score and steer <em>away</em> from it. The guidance scale ω_neg controls how strongly you push away from c⁻.</p>
<p>The problem is that as ω_neg increases, you get safer images but the CLIP score (text-image alignment) and FID (image quality) both degrade — there is an inherent safety-fidelity trade-off. Previous work (Koulischer et al.) tried making the negative guidance scale dynamic based on estimated p_t(c⁻|x_t), but the negative prompt content itself was still fixed at inference start.</p>

<h3>The VL-DNP Method</h3>
<p>VL-DNP (Vision-Language guided Dynamic Negative Prompting) makes the negative prompt content itself dynamic. The key idea: during denoising, at selected timesteps, predict what the final image will look like, show it to a Vision-Language Model (VLM), and ask the VLM to identify problematic content and generate a targeted negative prompt. This dynamic negative prompt is then applied for subsequent denoising steps.</p>
<p>Concretely, the pipeline works as follows:</p>
<ul>
<li>Standard CFG denoising begins with the positive prompt.</li>
<li>At predefined timesteps T = {t₁, t₂, ...} (in the paper: timesteps 45, 44, 43, 41, 38, 34, 29, 23, 16, 8 out of 50 total), compute an intermediate prediction of the clean image x̂₀ using the current noisy latent.</li>
<li>Feed x̂₀ to a VLM (Qwen2.5-VL-7B) with a prompt asking it to identify inappropriate content.</li>
<li>The VLM returns a dynamic negative prompt (e.g., "Male breast, Buttocks" instead of a generic "nsfw").</li>
<li>Use this specific negative prompt in CFG for subsequent denoising steps.</li>
</ul>
<p>The VLM query happens at multiple points, so as the image evolves, the negative prompt updates. If a problematic element disappears, the VLM stops flagging it. If a new problem emerges, the VLM catches it. This is fundamentally adaptive in a way that fixed prompts cannot be.</p>

<h3>Why It Works Better: Two Reasons</h3>
<p>First, <strong>specificity</strong>: A VLM generates narrow, concept-specific negative prompts rather than broad ones like "nsfw". "Male breast, Buttocks" suppresses exactly the problematic content without collaterally suppressing benign beach imagery. This reduces semantic drift. Second, <strong>temporal adaptivity</strong>: Prompts evolve during generation. Once an artifact disappears, the VLM stops applying pressure to suppress it, preventing over-suppression in later denoising steps.</p>

<h3>Experimental Results</h3>
<p>The paper evaluates on three safety datasets (Ring-a-Bell-16, P4D, Unlearn-Diff — all adversarial prompts designed to elicit unsafe content) and COCO-100 (general image quality). Metrics: Attack Success Rate (ASR, lower is safer), Toxic Rate (TR, lower is safer), CLIP score (higher = better text alignment), FID (lower = better image quality).</p>
<p>The headline result: VL-DNP dominates the Pareto frontier in safety-vs-alignment trade-offs. At negative guidance scale ω_neg = 20, VL-DNP achieves ASR of 0.011 on Ring-a-Bell-16 with CLIP = 0.311 and FID = 15.3. Static negative prompting at the same scale achieves ASR = 0.025 with CLIP = 0.277 and FID = 152.5. This is striking: VL-DNP is safer (lower ASR) AND has 4× better text alignment AND 10× lower FID. Every static negative prompting point is Pareto-dominated by at least one VL-DNP point.</p>
<p>The comparison to SAFREE (a training-free token embedding approach) is also informative: SAFREE preserves CLIP score well but achieves poor safety (ASR 0.30 on Ring-a-Bell-16), while VL-DNP achieves far better safety at comparable or better CLIP.</p>

<h3>Limitations</h3>
<p>The main cost is latency: VLM queries add significant overhead (29.6 seconds vs. 8–12 seconds for static approaches). The paper acknowledges this and suggests future work: caching intermediate predictions, querying less frequently, or using lighter-weight VLMs. Absolute safety also still depends on the guidance scale — VL-DNP shifts the frontier but does not make the model unconditionally safe at low guidance scales.</p>

<h3>Why This Matters for the Lab's Research</h3>
<p>This is a workshop paper from KAIST (the lab's institution), demonstrating the lab's interest in safe generative AI. It connects diffusion models with language models in an inference-time pipeline, showing the lab engages with both the theory (DPAIL) and practical safety applications (VL-DNP) of generative models. For a prospective student, understanding this paper shows awareness of the lab's dual focus on expressiveness and safety in generative modeling.</p>
`

  {
    id: 'p3',
    professor: 'Kee-Eung Kim',
    title: 'MONET: Mixture of Monosemantic Experts for Transformers',
    authors: 'Jungwoo Park, Young Jin Ahn, Kee-Eung Kim, Jaewoo Kang',
    venue: 'ICLR 2025',
    url: 'asset/KeeEungKim/9736_Monet_Mixture_of_Monosema.pdf',
    topic: 'mechanistic interpretability, MoE, LLM, polysemanticity',
    status: 'unread',
    summary: `
<h3>What Problem Does This Paper Solve?</h3>
<p>Large Language Models (LLMs) are powerful but opaque. We do not understand what concepts individual neurons encode, which makes it hard to trust, align, or edit their behavior. The core obstacle is <strong>polysemanticity</strong>: a single neuron responds to many unrelated concepts simultaneously. For example, a neuron in GPT-2 might activate for "banana," "yellow," and "tropical" — concepts that are related but could also respond to completely unrelated concepts in other contexts. This is not random — it arises because networks try to encode more features than they have neurons, using a compressed superposition.</p>
<p><strong>Sparse Autoencoders (SAEs)</strong> were a promising post-hoc fix: train a sparse dictionary on the network's activations to disentangle these superposed features. SAEs have shown that individual "dictionary features" are often monosemantic (responding to a single concept). However, SAEs have two critical problems. First, they are trained on different data than the original model, causing distribution mismatch and degraded model performance when SAE features are steered. Second, using SAE features to control model behavior often breaks performance on other tasks — you can suppress toxicity but the model loses general capability.</p>

<h3>The Core Idea: Build Interpretability Into Training</h3>
<p>MONET (Mixture of Monosemantic Experts for Transformers) integrates sparse dictionary learning directly into the pretraining process via a Mixture-of-Experts (MoE) architecture. Instead of post-hoc decomposition, MONET trains the model end-to-end with many small, specialized experts per layer. The hypothesis is that with enough experts, each expert will naturally specialize in a narrow concept — monosemanticity arises from sufficient specialization pressure.</p>
<p>The key number is 262,144 experts per layer. Standard MoE models (like Mixtral) use 8 to 64 experts — far too few for monosemanticity. With only a few dozen experts, each expert must cover many unrelated topics and remains polysemantic. MONET scales this to 2^18 experts, theoretically sufficient for fine-grained specialization.</p>

<h3>The Expert Decomposition Trick</h3>
<p>The obvious obstacle is memory: 262,144 experts × standard expert size = enormous parameter count. MONET solves this with a novel <strong>expert decomposition</strong>. Each expert is factored into a pair of "left" (Up) and "right" (Down) sub-experts:</p>
<ul>
<li>N left sub-experts, each with a projection matrix U_i ∈ R^{m×d}</li>
<li>N right sub-experts, each with a projection matrix V_j ∈ R^{d×m}</li>
<li>The full expert (i,j) is implicitly E_{i,j}(x) = V_j · σ(U_i · x)</li>
</ul>
<p>This gives N² expert combinations with only 2N parameter matrices. Total parameters scale as O(√N · m · d) instead of O(N · m · d). To select which expert to activate for a given input, MONET uses two sets of N routing keys (for left and right), and selects top-k₁ left experts and top-k₂ right experts. This decomposition is applied at every layer of the transformer, not just specific layers — ensuring uniform interpretability throughout the network.</p>

<h3>Why Expert Specialization Implies Monosemanticity</h3>
<p>The training process naturally encourages specialization: each expert is activated for only a tiny fraction of inputs (sparse routing). If the total number of experts is large enough, different experts end up specializing on different semantic concepts simply because there are enough "slots" to avoid packing multiple concepts into one expert. The superposition hypothesis predicts this: with more features available (more experts), there is less pressure to compress. MONET's analyses confirm that expert routing exhibits high mutual exclusivity — the set of inputs that activate expert A overlaps minimally with the set that activates expert B.</p>

<h3>Knowledge Manipulation Without Performance Degradation</h3>
<p>The most striking result is that MONET enables direct, surgical knowledge editing without hurting general performance. Three types of manipulation are demonstrated:</p>
<ul>
<li><strong>Domain suppression</strong>: Identify experts whose routing is correlated with a domain (e.g., medical text) by analyzing routing patterns on domain-specific data. Zero out or reduce the contribution of those experts. The model stops generating medical content without degrading performance on other domains.</li>
<li><strong>Language manipulation</strong>: Similarly identify language-specific experts and suppress them to prevent generation in a specific language.</li>
<li><strong>Toxicity mitigation</strong>: Identify experts that activate on toxic content and reduce their influence. Unlike SAE-based steering, this does not degrade overall language modeling quality because the manipulation is confined to truly task-specific experts.</li>
</ul>

<h3>The Key Insight: Diffusion Features Are Corruption-Aware</h3>

let activePaperId = null;
const statusStore = JSON.parse(localStorage.getItem('paper_status') || '{}');

function getStatus(id) { return statusStore[id] || 'unread'; }
function setStatus(id, val) { statusStore[id] = val; localStorage.setItem('paper_status', JSON.stringify(statusStore)); }

function renderSidebar(filter = '') {
  const list = document.getElementById('paper-list');
  const q = filter.toLowerCase();
  const filtered = q
    ? PAPERS.filter(p => p.title.toLowerCase().includes(q) || p.authors.toLowerCase().includes(q) || p.topic.toLowerCase().includes(q))
    : PAPERS;

  const groups = {};
  filtered.forEach(p => {
    if (!groups[p.professor]) groups[p.professor] = [];
    groups[p.professor].push(p);
  });

  if (filtered.length === 0) {
    list.innerHTML = `<div style="padding:20px 16px;font-size:13px;color:var(--muted);text-align:center">No papers found</div>`;
  } else {
    list.innerHTML = Object.entries(groups).map(([prof, ps]) => `
      <div class="group-label">${escHtml(prof)}</div>
      ${ps.map(p => `
        <div class="paper-item ${p.id === activePaperId ? 'active' : ''}" onclick="selectPaper('${p.id}')">
          <div class="paper-item-title">${escHtml(p.title)}</div>
          <div class="paper-item-meta">${escHtml(p.venue)}</div>
          <span class="paper-item-status status-${getStatus(p.id)}">${statusLabel(getStatus(p.id))}</span>
        </div>`).join('')}
    `).join('');
  }

  const all = PAPERS.length;
  const reading = PAPERS.filter(p => getStatus(p.id) === 'reading').length;
  const done = PAPERS.filter(p => getStatus(p.id) === 'done').length;
  document.getElementById('stat-total').textContent = all;
  document.getElementById('stat-reading').textContent = reading;
  document.getElementById('stat-done').textContent = done;
}

function statusLabel(s) {
  return s === 'unread' ? 'Unread' : s === 'reading' ? 'Reading' : 'Done';
}

function selectPaper(id) {
  activePaperId = id;
  renderSidebar(document.getElementById('search-input').value);
  renderDetail();
}

function renderDetail() {
  const p = PAPERS.find(x => x.id === activePaperId);
  document.getElementById('empty-state').classList.add('hidden');
  const det = document.getElementById('paper-detail');
  det.classList.remove('hidden');

  det.innerHTML = `
    <div class="detail-header">
      <div class="detail-title">${escHtml(p.title)}</div>
      <div class="detail-authors">${escHtml(p.authors)}</div>
      <div class="detail-lab">Lab: ${escHtml(p.professor)}</div>
      <div class="detail-meta">
        <span class="tag tag-accent">${escHtml(p.venue)}</span>
        ${p.topic.split(',').map(t => `<span class="tag">${escHtml(t.trim())}</span>`).join('')}
      </div>
      <div class="detail-actions">
        <select class="status-select" onchange="updateStatus(this.value)">
          <option value="unread" ${getStatus(p.id)==='unread'?'selected':''}>Unread</option>
          <option value="reading" ${getStatus(p.id)==='reading'?'selected':''}>Reading</option>
          <option value="done" ${getStatus(p.id)==='done'?'selected':''}>Done</option>
        </select>
        <a href="${escHtml(p.url)}" target="_blank" rel="noopener" class="btn btn-secondary">Open PDF</a>
      </div>
    </div>
    <div class="summary-section">
      <h2>Summary</h2>
      <div class="summary-body">${p.summary}</div>
    </div>
  `;
}

function updateStatus(val) {
  setStatus(activePaperId, val);
  renderSidebar(document.getElementById('search-input').value);
}

document.getElementById('search-input').addEventListener('input', e => renderSidebar(e.target.value));

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('search-input').focus();
  }
});

function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

renderSidebar();
if (PAPERS.length > 0) selectPaper(PAPERS[0].id);
</script>
</body>
</html>
